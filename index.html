<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#1A6B4A">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Darwin Juros">
  <meta name="description" content="Estime suas parcelas de evolução de obra com mais precisão.">
  <title>Darwin Juros</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="splash">
  <div class="splash-icon">🏗️</div>
  <div class="splash-title">Darwin Juros</div>
  <div class="splash-sub">Sua evolução sem surpresas</div>
</div>

<div id="root">
  <header>
    <a href="#" class="header-logo" onclick="goProfilesSafe(); return false;" aria-label="Meus Imóveis" style="text-decoration: none;">
      <div class="header-logo">
        <div class="logo-icon">🏗️</div>
        <div>
          <span>Darwin Juros</span>
          <small>Sua evolução sem surpresas</small>
        </div>
      </div>
    </a>
    <div class="header-actions">
      <button class="btn-root" onclick="novaSimulacaoSafe()">📄  Nova</button>
      <button class="btn-root" onclick="goProfilesSafe()">📁 Perfis</button>
    </div>
  </header>
  <main id="main"></main>
</div>

<div class="toast" id="toast"></div>

<!-- CELEBRAÇÃO -->
<div id="celebration">
  <div class="celebration-backdrop" onclick="closeCelebration()"></div>
  <div class="celebration-card">
    <span class="celebration-emoji">🎉</span>
    <div class="celebration-title">Parabéns!</div>
    <div class="celebration-sub">Seu novo apartamento está pronto!<br>Todas as parcelas de evolução de obra foram concluídas.</div>
    <button class="celebration-btn" onclick="closeCelebration()">Que incrível! 🏠</button>
  </div>
</div>

<!-- ── SCRIPTS: ordem importa (dependências primeiro) ── -->

<!-- 1. Estado global e constantes -->
<script src="js/core/state.js"></script>

<!-- 2. Storage (depende de state) -->
<script src="js/core/storage.js"></script>

<!-- 3. Utilitários (dependem de state) -->
<script src="js/utils/format.js"></script>
<script src="js/utils/ui.js"></script>

<!-- 4. Cálculo (depende de state + utils) -->
<script src="js/modules/calculator.js"></script>

<!-- 5. Módulos de tela (dependem de tudo acima) -->
<script src="js/modules/onboarding.js"></script>
<script src="js/modules/fluxoB.js"></script>
<script src="js/modules/result.js"></script>
<script src="js/modules/paywall.js"></script>

<!-- 6. Inicialização (deve ser o último) -->
<script src="js/main.js"></script>

</body>
</html>
