<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#1A6B4A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Juros de Obra">
<meta name="description" content="Estime suas parcelas de evolução de obra com precisão.">
<title>Juros de Obra</title>
<link rel="manifest" href="#" id="manifest-placeholder">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#F7F6F2;--card:#FFFFFF;--text:#1A1A18;--muted:#888880;
  --accent:#1A6B4A;--accent-light:#E6F2EC;--accent-dark:#135438;
  --border:#E2E0D8;--danger:#C0392B;--danger-light:#FDF0EF;
  --warn-bg:#FFF8E6;--warn:#B7791F;--blue-bg:#EEF6FB;--blue:#1A5280;
  --radius:12px;--font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased;}

/* ── SPLASH ── */
#splash{position:fixed;inset:0;background:var(--accent);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:999;transition:opacity .4s ease;}
#splash.hide{opacity:0;pointer-events:none;}
.splash-icon{width:72px;height:72px;background:#fff;border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:36px;}
.splash-title{color:#fff;font-size:22px;font-weight:600;letter-spacing:-.02em;}
.splash-sub{color:rgba(255,255,255,.65);font-size:13px;}

/* ── LAYOUT ── */
#root{display:flex;flex-direction:column;min-height:100vh;}
header{background:var(--card);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
.header-logo{display:flex;align-items:center;gap:10px;}
.header-logo .logo-icon{width:32px;height:32px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.header-logo span{font-weight:600;font-size:15px;color:var(--text);}
.header-logo small{font-size:11px;color:var(--muted);display:block;line-height:1;}
.btn-profiles{background:var(--accent-light);color:var(--accent);border:none;border-radius:8px;padding:8px 14px;font-family:var(--font);font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:6px;}
.btn-profiles:hover{background:#d0eadb;}

main{flex:1;padding:20px 20px 60px;max-width:600px;width:100%;margin:0 auto;}

/* ── PROGRESS ── */
.progress-wrap{display:flex;gap:5px;margin-bottom:24px;}
.progress-dot{flex:1;height:3px;border-radius:2px;background:var(--border);transition:background .3s;}
.progress-dot.done{background:var(--accent);}
.progress-dot.active{background:var(--accent);opacity:.5;}

/* ── STEP CARD ── */
.step-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:28px 24px 24px;animation:fadeUp .2s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.step-num{font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:.08em;margin-bottom:10px;}
.step-title{font-size:20px;font-weight:600;line-height:1.3;margin-bottom:6px;}
.step-hint{font-size:13px;color:var(--muted);margin-bottom:20px;line-height:1.5;}

/* ── INPUTS ── */
input[type=text],input[type=number],input[type=month]{
  width:100%;padding:12px 14px;border:1px solid var(--border);border-radius:8px;
  font-family:var(--font);font-size:15px;color:var(--text);background:var(--bg);
  outline:none;transition:border .15s;-webkit-appearance:none;appearance:none;
}
input:focus{border-color:var(--accent);}
input.invalid{border-color:var(--danger);background:var(--danger-light);}
.input-wrap{position:relative;}
.input-wrap .pre{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--muted);pointer-events:none;z-index:1;}
.input-wrap .suf{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--muted);pointer-events:none;z-index:1;}
.input-wrap input.has-pre{padding-left:36px;}
.input-wrap input.has-suf{padding-right:44px;}
.field-label{font-size:11px;font-weight:500;color:var(--muted);margin-bottom:6px;display:block;letter-spacing:.05em;text-transform:uppercase;}
.field-group{margin-top:16px;}
.error-msg{font-size:12px;color:var(--danger);margin-top:6px;display:none;}
.char-count{font-size:11px;color:var(--muted);text-align:right;margin-top:4px;}
.char-count.warn{color:var(--danger);}

/* ── CONFIRM / INFO BOXES ── */
.confirm-box{background:var(--accent-light);border:1px solid #B2D8C4;border-radius:8px;padding:14px 16px;margin:14px 0;display:flex;justify-content:space-between;align-items:center;gap:12px;}
.confirm-box .c-label{font-size:12px;color:var(--accent);font-weight:500;}
.confirm-box .c-val{font-size:20px;font-weight:600;color:var(--accent);font-family:var(--mono);white-space:nowrap;}
.info-box{background:var(--warn-bg);border:1px solid #F6E0A0;border-radius:8px;padding:10px 14px;font-size:12px;color:var(--warn);margin-top:8px;line-height:1.5;}
.diff-box{background:#F0F7FF;border:1px solid #B2CDE8;border-radius:8px;padding:14px 16px;margin-top:14px;}
.diff-box .d-title{font-size:11px;font-weight:500;color:var(--blue);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px;}
.diff-row{display:flex;justify-content:space-between;align-items:center;font-size:13px;padding:4px 0;}
.diff-row .d-label{color:var(--blue);}
.diff-row .d-val{font-family:var(--mono);font-weight:600;color:var(--blue);}
.diff-row.hl .d-label{color:var(--accent);font-weight:500;}
.diff-row.hl .d-val{color:var(--accent);}
.diff-divider{border:none;border-top:1px solid #B2CDE8;margin:6px 0;}
.months-badge{display:inline-flex;align-items:center;gap:6px;background:var(--accent-light);border:1px solid #B2D8C4;border-radius:20px;padding:6px 14px;font-size:13px;color:var(--accent);font-weight:500;margin:12px 0 0;}
.months-badge.err{background:#FFF0F0;border-color:#F5C6C6;color:#A0392B;}

/* ── BUTTONS ── */
.btn{display:block;width:100%;padding:13px;border-radius:8px;border:none;font-family:var(--font);font-size:15px;font-weight:600;cursor:pointer;margin-top:16px;transition:opacity .15s;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:hover{opacity:.88;}
.btn-back{background:transparent;color:var(--muted);border:1px solid var(--border);font-weight:400;}
.btn-back:hover{background:var(--bg);}
.btn-danger{background:transparent;color:var(--danger);border:1px solid var(--danger);font-weight:400;}
.btn-danger:hover{background:var(--danger-light);}

/* ── PROFILES SCREEN ── */
.screen-title{font-size:18px;font-weight:600;margin-bottom:4px;}
.screen-sub{font-size:13px;color:var(--muted);margin-bottom:20px;}
.profile-list{display:flex;flex-direction:column;gap:10px;margin-bottom:20px;}
.profile-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:border .15s;}
.profile-card:hover{border-color:var(--accent);}
.profile-card .pc-name{font-weight:600;font-size:15px;margin-bottom:2px;}
.profile-card .pc-sub{font-size:12px;color:var(--muted);}
.profile-card .pc-actions{display:flex;gap:8px;flex-shrink:0;}
.pc-btn{background:none;border:1px solid var(--border);border-radius:6px;padding:5px 10px;font-size:12px;cursor:pointer;font-family:var(--font);color:var(--muted);}
.pc-btn:hover{background:var(--bg);}
.pc-btn.del:hover{color:var(--danger);border-color:var(--danger);}
.empty-state{text-align:center;padding:40px 20px;color:var(--muted);}
.empty-state .es-icon{font-size:40px;margin-bottom:12px;}
.empty-state p{font-size:14px;line-height:1.6;}

/* ── RESULT ── */
.result-header{margin-bottom:16px;}
.result-header h2{font-size:18px;font-weight:600;margin-bottom:2px;word-break:break-word;}
.result-header p{font-size:13px;color:var(--muted);}
.result-header .rh-actions{display:flex;gap:8px;margin-top:10px;}
.rh-btn{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:7px 14px;font-size:12px;font-family:var(--font);cursor:pointer;color:var(--text);font-weight:500;}
.rh-btn:hover{background:var(--bg);}
.rh-btn.save{background:var(--accent-light);border-color:#B2D8C4;color:var(--accent);}
.rh-btn.save:hover{background:#d0eadb;}
.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.summary-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;}
.summary-card .s-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;}
.summary-card .s-val{font-size:15px;font-weight:600;color:var(--text);}
.summary-card.accent{background:var(--accent-light);border-color:#B2D8C4;}
.summary-card.accent .s-val{color:var(--accent);}
.summary-card.paid{background:var(--blue-bg);border-color:#B2D4E8;}
.summary-card.paid .s-val{color:var(--blue);}
.alert{background:var(--warn-bg);border:1px solid #F6E0A0;border-radius:8px;padding:10px 14px;font-size:12px;color:var(--warn);margin-bottom:14px;line-height:1.5;}

/* ── TABLE ── */
.table-wrap{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow-x:auto;margin-bottom:8px;}
table{width:100%;border-collapse:collapse;font-size:13px;}
thead tr{background:var(--bg);}
th{padding:10px 8px;text-align:left;font-size:10px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--border);white-space:nowrap;}
td{padding:8px 8px;border-bottom:1px solid var(--border);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr.pago-row td{background:#F5FBF7;}
tr.obra-done td{background:#F8F8F6;color:var(--muted);}
tr.obra-done td input{background:#F0F0EE;color:var(--muted);pointer-events:none;}
.val-col{font-family:var(--mono);font-size:12px;text-align:right;}
.num-col{font-family:var(--mono);font-size:11px;color:var(--muted);text-align:center;min-width:26px;}
.perc-input{width:58px;padding:3px 6px;border:1px solid var(--border);border-radius:5px;font-family:var(--mono);font-size:12px;text-align:right;background:var(--bg);outline:none;transition:border .15s;}
.perc-input:focus{border-color:var(--accent);}
.perc-input.invalid{border-color:var(--danger);background:var(--danger-light);}
.tr-input{width:68px;padding:3px 6px;border:1px solid var(--border);border-radius:5px;font-family:var(--mono);font-size:12px;text-align:right;background:var(--bg);outline:none;transition:border .15s;}
.tr-input:focus{border-color:var(--accent);}
.tr-input.invalid{border-color:var(--danger);background:var(--danger-light);}
.badge-pago{background:#E6F2EC;color:var(--accent);font-size:11px;padding:3px 8px;border-radius:20px;font-weight:500;cursor:pointer;white-space:nowrap;border:none;font-family:var(--font);}
.badge-nao{background:#F2F2F0;color:var(--muted);font-size:11px;padding:3px 8px;border-radius:20px;cursor:pointer;white-space:nowrap;border:none;font-family:var(--font);}
.badge-blocked{background:#F2F2F0;color:#CCC;font-size:11px;padding:3px 8px;border-radius:20px;cursor:not-allowed;white-space:nowrap;border:none;}
.row-controls{display:flex;align-items:center;justify-content:flex-end;gap:10px;padding:10px 12px 12px;border-top:1px dashed var(--border);}
.rc-info{font-size:12px;color:var(--muted);flex:1;}
.rc-btn{width:34px;height:34px;border-radius:50%;border:1px solid var(--border);background:var(--card);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text);transition:all .15s;line-height:1;}
.rc-btn:hover:not(:disabled){background:var(--accent);color:#fff;border-color:var(--accent);}
.rc-btn:disabled{opacity:.3;cursor:not-allowed;}
.note{font-size:12px;color:var(--muted);text-align:center;padding:0 8px;margin-bottom:12px;}
.btn-reset{display:block;width:100%;padding:11px;border-radius:8px;border:1px solid var(--border);font-family:var(--font);font-size:13px;font-weight:500;cursor:pointer;background:transparent;color:var(--muted);margin-top:4px;}
.btn-reset:hover{background:var(--bg);}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--text);color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;opacity:0;transition:all .3s;pointer-events:none;z-index:100;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<div id="splash">
  <div class="splash-icon">🏗️</div>
  <div class="splash-title">Juros de Obra</div>
  <div class="splash-sub">Caixa Econômica Federal</div>
</div>

<div id="root">
  <header>
    <div class="header-logo">
      <div class="logo-icon">🏗️</div>
      <div>
        <span>Juros de Obra</span>
        <small>Caixa Econômica Federal</small>
      </div>
    </div>
    <button class="btn-profiles" onclick="goProfiles()">📁 Perfis</button>
  </header>
  <main id="main"></main>
</div>

<div class="toast" id="toast"></div>

<script>
// ── CONSTANTES ─────────────────────────────────────────────
const MAX_MESES = 48;
const STORAGE_KEY = 'juros_obra_perfis';
const TOTAL_STEPS = 8;

// ── ESTADO ─────────────────────────────────────────────────
let currentStep = 0;
let currentProfileId = null;
let screen = 'onboarding'; // 'profiles' | 'onboarding' | 'result'

const form = {
  mesInicial:'', valorTotal:'', percFinanciado:80,
  valorTerreno:'', seguro:'', taxaAdm:'',
  taxaAnual:'', trInicial:0.001, mesEntrega:'',
  nomeSimulacao:''
};
let meses = [];

// ── STORAGE ────────────────────────────────────────────────
function loadProfiles(){ try{ return JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]'); }catch(e){return[];} }
function saveProfiles(p){ localStorage.setItem(STORAGE_KEY, JSON.stringify(p)); }

function saveProfile(){
  const profiles = loadProfiles();
  const data = { id: currentProfileId||Date.now().toString(), nome: form.nomeSimulacao||'Apto 1', form: {...form}, meses: JSON.parse(JSON.stringify(meses)), savedAt: new Date().toISOString() };
  const idx = profiles.findIndex(p=>p.id===data.id);
  if(idx>=0) profiles[idx]=data; else profiles.push(data);
  currentProfileId = data.id;
  saveProfiles(profiles);
  showToast('Perfil salvo com sucesso!');
}

function deleteProfile(id){
  if(!confirm('Excluir este perfil? Esta ação não pode ser desfeita.')) return;
  const profiles = loadProfiles().filter(p=>p.id!==id);
  saveProfiles(profiles);
  renderProfiles();
}

function loadProfile(id){
  const p = loadProfiles().find(p=>p.id===id);
  if(!p) return;
  currentProfileId = p.id;
  Object.assign(form, p.form);
  meses = JSON.parse(JSON.stringify(p.meses));
  screen = 'result';
  renderResult();
}

// ── HELPERS ────────────────────────────────────────────────
function fmtBRL(v){ return Number(v).toLocaleString('pt-BR',{style:'currency',currency:'BRL',minimumFractionDigits:2}); }
function fmtPerc(v,d=4){ return Number(v).toLocaleString('pt-BR',{minimumFractionDigits:d,maximumFractionDigits:d})+'%'; }
function sanitizeName(s){ return s.replace(/[<>"'`\\\/\{\}\[\]]/g,'').trim().slice(0,30); }
function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function parseMS(s){ if(!s) return null; const [y,m]=s.split('-').map(Number); return {y,m}; }
function mBetween(a,b){ return (b.y-a.y)*12+(b.m-a.m); }
function addM(base,n){ let m=base.m+n,y=base.y; while(m>12){m-=12;y++;} return {y,m}; }
function mLabel(ym){ return ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'][ym.m-1]+'/'+ym.y; }
function mLabelFull(s){ if(!s) return ''; const ym=parseMS(s); return ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'][ym.m-1]+' de '+ym.y; }
function fmtDate(iso){ return new Date(iso).toLocaleDateString('pt-BR'); }

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}
function markError(id){ const el=document.getElementById(id); if(el){el.classList.add('invalid');el.focus();} }
function setHtml(html){ document.getElementById('main').innerHTML=html; }

// ── PROGRESS ───────────────────────────────────────────────
function renderProgress(){
  return `<div class="progress-wrap">${Array.from({length:TOTAL_STEPS},(_,i)=>`<div class="progress-dot ${i<currentStep?'done':i===currentStep?'active':''}"></div>`).join('')}</div>`;
}

// ── CÁLCULO ────────────────────────────────────────────────
function calcTable(){
  const fin=parseFloat(form.valorTotal)*(parseFloat(form.percFinanciado)/100);
  const ter=parseFloat(form.valorTerreno);
  const enc=parseFloat(form.seguro||0)+parseFloat(form.taxaAdm||25);
  const tm=parseFloat(form.taxaAnual)/100/12;
  const sMax=fin-ter;
  const ini=parseMS(form.mesInicial), ent=parseMS(form.mesEntrega);
  const total=Math.min(mBetween(ini,ent),MAX_MESES);
  const rows=[];
  rows.push({mes:mLabel(ini),perc:0,saldo:ter,tr:form.trInicial,previsto:(tm+form.trInicial)*ter+enc,pago:false,bloqueado:false});
  for(let i=1;i<=total;i++){
    const ym=addM(ini,i);
    const perc=parseFloat(((i/total)*100).toFixed(1));
    const saldo=ter+sMax*(perc/100);
    rows.push({mes:mLabel(ym),perc,saldo,tr:form.trInicial,previsto:(tm+form.trInicial)*saldo+enc,pago:false,bloqueado:false});
  }
  return rows;
}

function recalcRow(i){
  const r=meses[i];
  const fin=parseFloat(form.valorTotal)*(parseFloat(form.percFinanciado)/100);
  const ter=parseFloat(form.valorTerreno);
  const enc=parseFloat(form.seguro||0)+parseFloat(form.taxaAdm||25);
  const tm=parseFloat(form.taxaAnual)/100/12;
  r.saldo=ter+(fin-ter)*(r.perc/100);
  r.previsto=(tm+r.tr)*r.saldo+enc;
}

function aplicaBloqueio(){
  let found=false;
  meses.forEach(r=>{ if(found){r.bloqueado=true;} else if(r.perc>=100){found=true;r.bloqueado=false;} else{r.bloqueado=false;} });
}

function proximoMes(){
  const ini=parseMS(form.mesInicial);
  return mLabel(addM(ini,meses.length));
}

function adicionarLinha(){
  if(meses.length>=MAX_MESES+1) return;
  const fin=parseFloat(form.valorTotal)*(parseFloat(form.percFinanciado)/100);
  const ter=parseFloat(form.valorTerreno);
  const enc=parseFloat(form.seguro||0)+parseFloat(form.taxaAdm||25);
  const tm=parseFloat(form.taxaAnual)/100/12;
  const perc=Math.min(meses[meses.length-1]?.perc||0,100);
  const saldo=ter+(fin-ter)*(perc/100);
  meses.push({mes:proximoMes(),perc,saldo,tr:form.trInicial,previsto:(tm+form.trInicial)*saldo+enc,pago:false,bloqueado:false});
  aplicaBloqueio();
  renderResult();
}

function removerLinha(){
  const last=meses[meses.length-1];
  if(!last||last.pago||meses.length<=1) return;
  meses.pop();
  aplicaBloqueio();
  renderResult();
}

// ── TOGGLE PAGO ────────────────────────────────────────────
function togglePago(i){
  const r=meses[i];
  if(r.bloqueado) return;
  if(!r.pago){
    for(let j=0;j<i;j++){ if(!meses[j].bloqueado&&!meses[j].pago){alert('Marque primeiro a parcela de '+meses[j].mes+'.');return;} }
    r.pago=true;
  } else {
    for(let j=i+1;j<meses.length;j++){ if(!meses[j].bloqueado&&meses[j].pago){alert('Desmarque primeiro a parcela de '+meses[j].mes+'.');return;} }
    r.pago=false;
  }
  refreshTable();
}

// ── EDIÇÃO INLINE ──────────────────────────────────────────
function updatePerc(i,val){
  const el=document.getElementById('pi-'+i);
  const v=parseFloat(val);
  if(val===''||isNaN(v)||v<0||v>100){ if(el)el.classList.add('invalid'); return; }
  if(el)el.classList.remove('invalid');
  meses[i].perc=v; recalcRow(i); aplicaBloqueio(); refreshTable();
}
function validatePercBlur(i){
  const el=document.getElementById('pi-'+i); if(!el) return;
  const v=parseFloat(el.value);
  if(el.value===''||isNaN(v)||v<0||v>100){el.classList.add('invalid');} else {el.classList.remove('invalid');}
}
function updateTR(i,val){
  const el=document.getElementById('ti-'+i);
  const v=parseFloat(val);
  if(val===''||isNaN(v)||v<0){ if(el)el.classList.add('invalid'); return; }
  if(el)el.classList.remove('invalid');
  meses[i].tr=v/100; recalcRow(i);
  const elP=document.getElementById('rp-'+i);
  if(elP) elP.textContent=meses[i].bloqueado?'—':fmtBRL(meses[i].previsto);
  updateSummary();
}
function validateTRBlur(i){
  const el=document.getElementById('ti-'+i); if(!el) return;
  const v=parseFloat(el.value);
  if(el.value===''||isNaN(v)||v<0){el.classList.add('invalid');} else {el.classList.remove('invalid');}
}

function refreshTable(){
  meses.forEach((r,i)=>{
    const row=document.getElementById('row-'+i); if(!row) return;
    row.className=r.bloqueado?'obra-done':r.pago?'pago-row':'';
    const pi=document.getElementById('pi-'+i); if(pi){pi.disabled=r.bloqueado;if(!r.bloqueado)pi.value=r.perc;}
    const ti=document.getElementById('ti-'+i); if(ti) ti.disabled=r.bloqueado;
    const rs=document.getElementById('rs-'+i); if(rs) rs.textContent=r.bloqueado?'—':fmtBRL(r.saldo);
    const rp=document.getElementById('rp-'+i); if(rp) rp.textContent=r.bloqueado?'—':fmtBRL(r.previsto);
    const bp=document.getElementById('bp-'+i);
    if(bp){
      if(r.bloqueado) bp.outerHTML=`<span id="bp-${i}" class="badge-blocked">—</span>`;
      else if(r.pago) bp.outerHTML=`<button id="bp-${i}" class="badge-pago" onclick="togglePago(${i})">✓ Pago</button>`;
      else            bp.outerHTML=`<button id="bp-${i}" class="badge-nao" onclick="togglePago(${i})">—</button>`;
    }
  });
  const btnAdd=document.getElementById('btn-add'), btnRem=document.getElementById('btn-rem'), rcInfo=document.getElementById('rc-info');
  if(btnAdd) btnAdd.disabled=meses.length>=MAX_MESES+1;
  if(btnRem){ const last=meses[meses.length-1]; btnRem.disabled=meses.length<=1||(last&&last.pago); }
  if(rcInfo) rcInfo.textContent=(meses.length-1)+' parcela(s) · máx. '+MAX_MESES;
  updateSummary();
}

function updateSummary(){
  const ativas=meses.filter(r=>!r.bloqueado);
  const total=ativas.reduce((s,r)=>s+r.previsto,0);
  const pago=ativas.filter(r=>r.pago).reduce((s,r)=>s+r.previsto,0);
  const media=ativas.length?total/ativas.length:0;
  const e=id=>document.getElementById(id);
  if(e('sum-total')) e('sum-total').textContent=fmtBRL(total);
  if(e('sum-pago'))  e('sum-pago').textContent=fmtBRL(pago);
  if(e('sum-media')) e('sum-media').textContent=fmtBRL(media);
}

// ── TELA: PERFIS ───────────────────────────────────────────
function goProfiles(){ screen='profiles'; renderProfiles(); }

function renderProfiles(){
  const profiles=loadProfiles();
  const list = profiles.length
    ? profiles.map(p=>`
      <div class="profile-card" onclick="loadProfile('${p.id}')">
        <div>
          <div class="pc-name">${escHtml(p.nome)}</div>
          <div class="pc-sub">Salvo em ${fmtDate(p.savedAt)} · ${p.meses.length-1} parcelas</div>
        </div>
        <div class="pc-actions" onclick="event.stopPropagation()">
          <button class="pc-btn" onclick="loadProfile('${p.id}')">Abrir</button>
          <button class="pc-btn del" onclick="deleteProfile('${p.id}')">Excluir</button>
        </div>
      </div>`).join('')
    : `<div class="empty-state"><div class="es-icon">📭</div><p>Nenhum perfil salvo ainda.<br>Faça uma simulação e clique em <strong>Salvar</strong>.</p></div>`;

  setHtml(`
    <div class="screen-title">Meus perfis</div>
    <div class="screen-sub">Simule e salve quantos imóveis quiser.</div>
    <div class="profile-list">${list}</div>
    <button class="btn btn-primary" onclick="novaSimulacao()">+ Nova simulação</button>
  `);
}

function novaSimulacao(){
  currentProfileId=null;
  Object.keys(form).forEach(k=>{ form[k]=''; });
  form.percFinanciado=80; form.trInicial=0.001;
  meses=[]; currentStep=0; screen='onboarding';
  renderStep();
}

// ── TELA: ONBOARDING ───────────────────────────────────────
function nextStep(){
  try{
    if(currentStep===0){
      const v=document.getElementById('inp-mesInicial').value;
      if(!v){markError('inp-mesInicial');return;} form.mesInicial=v;
    } else if(currentStep===1){
      const v=document.getElementById('inp-valorTotal').value;
      if(!v||parseFloat(v)<=0){markError('inp-valorTotal');return;}
      form.valorTotal=v; form.percFinanciado=document.getElementById('inp-percFinanciado').value||80;
    } else if(currentStep===2){
      const v=document.getElementById('inp-valorTerreno').value;
      const fin=parseFloat(form.valorTotal)*(parseFloat(form.percFinanciado)/100);
      if(!v||parseFloat(v)<=0){markError('inp-valorTerreno');return;}
      if(parseFloat(v)>=fin){markError('inp-valorTerreno');document.getElementById('err-terreno').style.display='block';return;}
      form.valorTerreno=v;
    } else if(currentStep===3){
      const s=document.getElementById('inp-seguro').value;
      if(!s||parseFloat(s)<=0){markError('inp-seguro');return;}
      form.seguro=s; form.taxaAdm=document.getElementById('inp-taxaAdm').value||25;
    } else if(currentStep===4){
      const v=document.getElementById('inp-taxaAnual').value;
      if(!v||parseFloat(v)<=0){markError('inp-taxaAnual');return;} form.taxaAnual=v;
    } else if(currentStep===5){
      const v=document.getElementById('inp-mesEntrega').value;
      if(!v){markError('inp-mesEntrega');return;}
      const ini=parseMS(form.mesInicial),fin=parseMS(v);
      if(mBetween(ini,fin)<=0){markError('inp-mesEntrega');return;}
      form.mesEntrega=v;
    } else if(currentStep===6){
      form.trInicial=(parseFloat(document.getElementById('inp-tr').value)||0.1)/100;
    } else if(currentStep===7){
      form.nomeSimulacao=sanitizeName(document.getElementById('inp-nome').value)||'Apto 1';
    }
    currentStep++;
    if(currentStep>=TOTAL_STEPS){ meses=calcTable(); screen='result'; renderResult(); }
    else renderStep();
  } catch(e){ console.error(e); }
}

function prevStep(){ if(currentStep>0){currentStep--;renderStep();} }

function renderStep(){
  const fin_val=form.valorTotal?parseFloat(form.valorTotal)*(parseFloat(form.percFinanciado)/100):0;
  const ter=parseFloat(form.valorTerreno)||0;
  const fin=parseFloat(form.valorTotal)*(parseFloat(form.percFinanciado)/100)||0;
  const seg=parseFloat(form.seguro)||0;
  const ta=parseFloat(form.taxaAnual)||0;

  const steps = [
    // 0
    `<div class="step-num">01 / 08</div>
    <div class="step-title">Qual o mês da 1ª parcela de evolução?</div>
    <div class="step-hint">Consta no seu contrato com a Caixa Econômica.</div>
    <input type="month" id="inp-mesInicial" value="${form.mesInicial}" oninput="this.classList.remove('invalid')">`,
    // 1
    `<div class="step-num">02 / 08</div>
    <div class="step-title">Qual o valor total do imóvel?</div>
    <div class="step-hint">O valor cheio do apartamento conforme contrato.</div>
    <label class="field-label">Valor total</label>
    <div class="input-wrap"><span class="pre">R$</span><input type="number" id="inp-valorTotal" class="has-pre" placeholder="250000" value="${form.valorTotal}" min="0" step="100" oninput="atualizaFin()"></div>
    <div class="field-group">
      <label class="field-label">Percentual financiado</label>
      <div class="input-wrap"><input type="number" id="inp-percFinanciado" class="has-suf" placeholder="80" value="${form.percFinanciado}" min="1" max="100" step="1" oninput="atualizaFin()"><span class="suf">%</span></div>
    </div>
    <div class="confirm-box" id="box-fin" style="${fin_val>0?'':'display:none'}">
      <div><div class="c-label">Valor financiado</div><div style="font-size:11px;color:var(--accent);margin-top:2px">Confirme antes de continuar</div></div>
      <div class="c-val" id="val-fin">${fin_val>0?fmtBRL(fin_val):''}</div>
    </div>`,
    // 2
    `<div class="step-num">03 / 08</div>
    <div class="step-title">Qual o valor do terreno?</div>
    <div class="step-hint">Consta no <strong>item 1.7</strong> do seu contrato Caixa. O terreno é a parcela do financiamento disponível desde o início — por isso as primeiras parcelas são menores.</div>
    <div class="input-wrap"><span class="pre">R$</span><input type="number" id="inp-valorTerreno" class="has-pre" placeholder="12000" value="${form.valorTerreno}" min="0" step="100" oninput="atualizaTer();this.classList.remove('invalid');document.getElementById('err-terreno').style.display='none'"></div>
    <div class="error-msg" id="err-terreno">O valor do terreno deve ser menor que o financiado (${fmtBRL(fin)}).</div>
    <div class="diff-box" id="box-ter" style="${ter>0?'':'display:none'}">
      <div class="d-title">Composição do financiamento</div>
      <div class="diff-row"><span class="d-label">Valor financiado total</span><span class="d-val">${fmtBRL(fin)}</span></div>
      <div class="diff-row"><span class="d-label">(−) Terreno</span><span class="d-val" id="d-ter">${ter>0?fmtBRL(ter):'—'}</span></div>
      <hr class="diff-divider">
      <div class="diff-row hl"><span class="d-label">Saldo máximo durante a obra</span><span class="d-val" id="d-saldo">${ter>0?fmtBRL(fin-ter):'—'}</span></div>
    </div>
    <div class="info-box">💡 O terreno já está incluso no financiamento desde a assinatura. As parcelas sobem conforme a obra avança.</div>`,
    // 3
    `<div class="step-num">04 / 08</div>
    <div class="step-title">Quais os seus encargos mensais?</div>
    <div class="step-hint">Valores cobrados mensalmente pela Caixa, independente do andamento da obra.</div>
    <label class="field-label">1. Seguro</label>
    <div class="input-wrap"><span class="pre">R$</span><input type="number" id="inp-seguro" class="has-pre" placeholder="44,00" value="${form.seguro}" min="0" step="0.01" oninput="atualizaEncargos();this.classList.remove('invalid')"></div>
    <div class="field-group">
      <label class="field-label">2. Taxa Administrativa</label>
      <div class="input-wrap"><span class="pre">R$</span><input type="number" id="inp-taxaAdm" class="has-pre" placeholder="25,00" value="${form.taxaAdm||''}" min="0" step="0.01" oninput="atualizaEncargos()"></div>
      <div class="info-box">O valor padrão da Taxa de Administração da Caixa Econômica é de R$ 25,00. Verifique no seu contrato.</div>
    </div>
    <div class="confirm-box" id="box-enc" style="${seg>0?'':'display:none'}">
      <div><div class="c-label">Total de encargos mensais</div></div>
      <div class="c-val" id="val-enc">${seg>0?fmtBRL(seg+25):''}</div>
    </div>`,
    // 4
    `<div class="step-num">05 / 08</div>
    <div class="step-title">Qual a sua taxa de juros anual?</div>
    <div class="step-hint">Consta na primeira página do contrato. O app converte para taxa mensal automaticamente.</div>
    <div class="input-wrap"><input type="number" id="inp-taxaAnual" class="has-suf" placeholder="8,00" value="${form.taxaAnual}" min="0" step="0.01" oninput="atualizaTaxa()"><span class="suf">% a.a.</span></div>
    <div class="confirm-box" id="box-taxa" style="${ta>0?'':'display:none'}">
      <div><div class="c-label">Taxa mensal equivalente</div><div style="font-size:11px;color:var(--accent);margin-top:2px">Usada nos cálculos mensais</div></div>
      <div class="c-val" id="val-taxa">${ta>0?fmtPerc(ta/12,4):''}</div>
    </div>`,
    // 5
    `<div class="step-num">06 / 08</div>
    <div class="step-title">Qual a data de entrega prevista?</div>
    <div class="step-hint">Sua 1ª parcela começa em <strong>${mLabelFull(form.mesInicial)}</strong>. A entrega define quantos meses de evolução serão simulados.</div>
    <input type="month" id="inp-mesEntrega" value="${form.mesEntrega}" oninput="atualizaMeses();this.classList.remove('invalid')">
    <div id="badge-meses"></div>`,
    // 6
    `<div class="step-num">07 / 08</div>
    <div class="step-title">Qual a taxa referencial estimada?</div>
    <div class="step-hint">A TR (Taxa Referencial) é divulgada pelo Banco Central todo mês. Para esta simulação inicial, use 0,1000% como estimativa — você poderá editar mês a mês na tabela de resultados.</div>
    <div class="input-wrap"><input type="number" id="inp-tr" class="has-suf" placeholder="0.1000" value="${(form.trInicial*100).toFixed(4)}" min="0" step="0.0001"><span class="suf">%</span></div>
    <div class="info-box">💡 Em versões futuras você receberá uma notificação no início de cada mês para atualizar a TR oficial.</div>`,
    // 7
    `<div class="step-num">08 / 08</div>
    <div class="step-title">Como quer chamar essa simulação?</div>
    <div class="step-hint">Máximo 30 caracteres. Ex: Apto Centro, Torre B, Meu apê.</div>
    <input type="text" id="inp-nome" placeholder="Apto 1" value="${escHtml(form.nomeSimulacao||'')}" maxlength="30" oninput="updateCharCount(this)">
    <div class="char-count" id="char-count">0 / 30</div>`
  ];

  const btnLabel = currentStep===7 ? 'Ver resultados →' : (currentStep===1 ? 'Confirmar e continuar →' : 'Continuar →');
  const html = `
    ${renderProgress()}
    <div class="step-card">
      ${steps[currentStep]}
      <button class="btn btn-primary" onclick="nextStep()">${btnLabel}</button>
      ${currentStep>0?'<button class="btn btn-back" onclick="prevStep()">← Voltar</button>':''}
    </div>`;
  setHtml(html);

  if(currentStep===5) setTimeout(()=>{if(form.mesEntrega)atualizaMeses();},50);
  if(currentStep===7) setTimeout(()=>{ const el=document.getElementById('inp-nome'); if(el) updateCharCount(el); },50);
  if(currentStep===2) setTimeout(()=>{if(ter>0)atualizaTer();},50);
  setTimeout(()=>{ const f=document.querySelector('.step-card input'); if(f) f.focus(); },80);
}

// helpers reativos onboarding
function atualizaFin(){
  const vt=parseFloat(document.getElementById('inp-valorTotal')?.value)||0;
  const p=parseFloat(document.getElementById('inp-percFinanciado')?.value)||80;
  const fin=vt*(p/100);
  const box=document.getElementById('box-fin'),val=document.getElementById('val-fin');
  if(box&&val){box.style.display=vt>0?'flex':'none';val.textContent=fmtBRL(fin);}
}
function atualizaTer(){
  const fin=parseFloat(form.valorTotal)*(parseFloat(form.percFinanciado)/100);
  const ter=parseFloat(document.getElementById('inp-valorTerreno')?.value)||0;
  const box=document.getElementById('box-ter');
  if(box) box.style.display=ter>0?'block':'none';
  const dt=document.getElementById('d-ter'),ds=document.getElementById('d-saldo');
  if(dt) dt.textContent=fmtBRL(ter);
  if(ds) ds.textContent=fmtBRL(Math.max(0,fin-ter));
}
function atualizaEncargos(){
  const s=parseFloat(document.getElementById('inp-seguro')?.value)||0;
  const a=parseFloat(document.getElementById('inp-taxaAdm')?.value)||25;
  const box=document.getElementById('box-enc'),val=document.getElementById('val-enc');
  if(box&&val){box.style.display=s>0?'flex':'none';val.textContent=fmtBRL(s+a);}
}
function atualizaTaxa(){
  const ta=parseFloat(document.getElementById('inp-taxaAnual')?.value)||0;
  const box=document.getElementById('box-taxa'),val=document.getElementById('val-taxa');
  if(box&&val){box.style.display=ta>0?'flex':'none';val.textContent=fmtPerc(ta/12,4);}
}
function atualizaMeses(){
  const v=document.getElementById('inp-mesEntrega')?.value;
  if(!v||!form.mesInicial) return;
  const ini=parseMS(form.mesInicial),fin=parseMS(v);
  const n=mBetween(ini,fin);
  const badge=document.getElementById('badge-meses');
  if(!badge) return;
  if(n>=1&&n<=MAX_MESES)
    badge.innerHTML=`<div class="months-badge">📅 ${mLabelFull(form.mesInicial)} → ${mLabelFull(v)} = <strong>${n} parcela(s)</strong></div>`;
  else if(n>MAX_MESES)
    badge.innerHTML=`<div class="months-badge err">⚠️ Máximo ${MAX_MESES} parcelas. Serão exibidas as primeiras ${MAX_MESES}.</div>`;
  else
    badge.innerHTML=`<div class="months-badge err">⚠️ A entrega deve ser após a 1ª parcela.</div>`;
}
function updateCharCount(inp){
  const len=sanitizeName(inp.value).length;
  const el=document.getElementById('char-count');
  if(el){el.textContent=len+' / 30';el.className='char-count'+(len>=28?' warn':'');}
}

// ── TELA: RESULTADO ────────────────────────────────────────
function renderResult(){
  aplicaBloqueio();
  const fin=parseFloat(form.valorTotal)*(parseFloat(form.percFinanciado)/100);
  const ativas=meses.filter(r=>!r.bloqueado);
  const total=ativas.reduce((s,r)=>s+r.previsto,0);
  const pago=ativas.filter(r=>r.pago).reduce((s,r)=>s+r.previsto,0);
  const media=ativas.length?total/ativas.length:0;
  const lastPago=meses[meses.length-1]?.pago||false;

  const tableRows=meses.map((r,i)=>`
    <tr id="row-${i}" class="${r.bloqueado?'obra-done':r.pago?'pago-row':''}">
      <td class="num-col">${i}</td>
      <td style="white-space:nowrap;font-size:12px">${escHtml(r.mes)}</td>
      <td style="text-align:right"><input id="pi-${i}" class="perc-input" type="number" value="${r.perc}" min="0" max="100" step="0.1" ${r.bloqueado?'disabled':''} oninput="updatePerc(${i},this.value)" onblur="validatePercBlur(${i})"></td>
      <td id="rs-${i}" class="val-col">${r.bloqueado?'—':fmtBRL(r.saldo)}</td>
      <td style="text-align:right"><input id="ti-${i}" class="tr-input" type="number" value="${(r.tr*100).toFixed(4)}" min="0" step="0.0001" ${r.bloqueado?'disabled':''} oninput="updateTR(${i},this.value)" onblur="validateTRBlur(${i})"></td>
      <td id="rp-${i}" class="val-col" style="font-weight:500">${r.bloqueado?'—':fmtBRL(r.previsto)}</td>
      <td style="text-align:center">
        ${r.bloqueado?`<span id="bp-${i}" class="badge-blocked">—</span>`
          :r.pago?`<button id="bp-${i}" class="badge-pago" onclick="togglePago(${i})">✓ Pago</button>`
          :`<button id="bp-${i}" class="badge-nao" onclick="togglePago(${i})">—</button>`}
      </td>
    </tr>`).join('');

  setHtml(`
    ${renderProgress()}
    <div class="result-header">
      <h2>${escHtml(form.nomeSimulacao||'Apto 1')}</h2>
      <p>${ativas.length} parcelas · ${mLabelFull(form.mesInicial)} → ${mLabelFull(form.mesEntrega)}</p>
      <div class="rh-actions">
        <button class="rh-btn save" onclick="saveProfile()">💾 Salvar perfil</button>
        <button class="rh-btn" onclick="novaSimulacao()">+ Nova simulação</button>
      </div>
    </div>
    <div class="alert">TR editável por mês (coluna TR%). Estimativa inicial: ${fmtPerc(form.trInicial*100,4)}. Atualize com o valor oficial do Banco Central a cada mês.</div>
    <div class="summary-grid">
      <div class="summary-card"><div class="s-label">Financiado</div><div class="s-val">${fmtBRL(fin)}</div></div>
      <div class="summary-card"><div class="s-label">Média estimada</div><div class="s-val" id="sum-media">${fmtBRL(media)}</div></div>
      <div class="summary-card paid"><div class="s-label">Total pago até agora</div><div class="s-val" id="sum-pago">${fmtBRL(pago)}</div></div>
      <div class="summary-card accent"><div class="s-label">Total estimado</div><div class="s-val" id="sum-total">${fmtBRL(total)}</div></div>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th style="text-align:center">#</th><th>Mês</th>
          <th style="text-align:right">% Obra</th><th style="text-align:right">Saldo dev.</th>
          <th style="text-align:right">TR %</th><th style="text-align:right">Previsto</th>
          <th style="text-align:center">Pago?</th>
        </tr></thead>
        <tbody>${tableRows}</tbody>
      </table>
      <div class="row-controls">
        <span class="rc-info" id="rc-info">${meses.length-1} parcela(s) · máx. ${MAX_MESES}</span>
        <button class="rc-btn" id="btn-rem" onclick="removerLinha()" title="Remover última parcela" ${meses.length<=1||lastPago?'disabled':''}>−</button>
        <button class="rc-btn" id="btn-add" onclick="adicionarLinha()" title="Adicionar parcela" ${meses.length>=MAX_MESES+1?'disabled':''}>+</button>
      </div>
    </div>
    <p class="note">Edite % de obra e TR mês a mês. Use + / − para ajustar o número de parcelas.</p>
    <button class="btn-reset" onclick="goProfiles()">← Voltar aos perfis</button>
  `);
}

// ── INIT ───────────────────────────────────────────────────
window.addEventListener('load',()=>{
  setTimeout(()=>{ document.getElementById('splash').classList.add('hide'); },1200);
  const profiles=loadProfiles();
  if(profiles.length>0){ screen='profiles'; renderProfiles(); }
  else { screen='onboarding'; renderStep(); }
});
</script>
</body>
</html>
